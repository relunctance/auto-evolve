name: Auto-Evolve Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Relative path to repository to scan (e.g., ../other-repo)'
        required: false
        default: ''

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Create auto-evolve label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const hasLabel = labels.data.some(l => l.name === 'auto-evolve');
            if (!hasLabel) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'auto-evolve',
                color: '1A73E8',
                description: 'Auto-evolve scan findings'
              });
              console.log('Created auto-evolve label');
            } else {
              console.log('auto-evolve label already exists');
            }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install openai requests

      - name: Determine target repo
        id: target
        run: |
          if [ -n "${{ inputs.target_repo }}" ]; then
            TARGET="${{ github.workspace }}/${{ inputs.target_repo }}"
          else
            TARGET="${{ github.workspace }}/main-repo"
          fi
          echo "path=$TARGET" >> $GITHUB_OUTPUT

      - name: Run Auto-Evolve scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          TARGET=$(cat $GITHUB_OUTPUT | grep path | cut -d= -f2)
          python3 scripts/auto-evolve.py scan --repo "$TARGET" --github-event ${{ github.event_name }}

      - name: Scan summary
        if: always()
        run: |
          echo "Scan completed at ${{ github.event_name }}"
