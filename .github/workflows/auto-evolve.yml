name: Auto-Evolve Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Relative path to repository to scan (e.g., ../other-repo)'
        required: false
        default: ''

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install openai requests

      - name: Determine target repo
        id: target
        run: |
          if [ -n "${{ inputs.target_repo }}" ]; then
            TARGET="${{ github.workspace }}/${{ inputs.target_repo }}"
            echo "path=$TARGET" >> $GITHUB_OUTPUT
          else
            echo "path=${{ github.workspace }}/main-repo" >> $GITHUB_OUTPUT
          fi

      - name: Run Auto-Evolve scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          TARGET=$(cat $GITHUB_OUTPUT | grep path | cut -d= -f2)
          python3 scripts/auto-evolve.py scan --repo "$TARGET" --github-event ${{ github.event_name }}

      - name: Scan summary
        if: always()
        run: |
          echo "Scan completed at ${{ github.event_name }}"
